<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>chromatic</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="chromatic-wrap">
  <div class="grid-bg"></div>
  <div class="scanline"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="status-bar">
    <div class="status-dot"></div>
    <div class="status-dot"></div>
    <div class="status-dot"></div>
    <span class="status-text">System Ready</span>
  </div>

  <div class="center-content">
    <div class="logo-ring">
      <div class="logo-inner">
        <div class="logo-hex"></div>
      </div>
    </div>

    <div class="game-title">Chromatic</div>
    <div class="subtitle">Innovations of Bounce</div>

    <div class="divider"></div>

    <div class="btn-group">
      <button class="btn primary" id="playBtn">
        <span class="btn-dot"></span>Play
      </button>
      <button class="btn" id="settingsBtn">
        <span class="btn-dot"></span>Settings
      </button>
    </div>
  </div>

  <div class="version-tag">v1.0.0</div>
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
