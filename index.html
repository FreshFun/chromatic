<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chromatic</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div id="app">

    <div id="menuScreen" class="screen">
      <div class="grid-bg"></div><div class="scanline"></div>
      <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
      <div class="status-bar">
        <div class="status-dot"></div><div class="status-dot"></div><div class="status-dot"></div>
        <span class="status-text">System Ready</span>
      </div>
      <div style="position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;">
        <div class="logo-ring"><div class="logo-inner"><div class="logo-hex"></div></div></div>
        <div class="game-title">Chromatic</div>
        <div class="subtitle">Innovations of Bounce</div>
        <div class="divider"></div>
        <div class="btn-group">
          <button class="btn primary" id="playBtn"><span class="btn-dot"></span>Play</button>
          <button class="btn" id="settingsBtn"><span class="btn-dot"></span>Settings</button>
        </div>
      </div>
      <div class="version-tag">v1.0.0</div>
    </div>

    <div id="modeScreen" class="screen hidden">
      <div class="grid-bg"></div><div class="scanline"></div>
      <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
      <div style="position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:24px;">
        <div style="font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:6px;color:rgba(100,160,255,0.5);text-transform:uppercase;">Select Mode</div>
        <button class="btn primary" id="chromaticModeBtn" style="width:260px;font-size:15px;padding:20px 0;"><span class="btn-dot"></span>Chromatic</button>
        <button class="btn primary" id="originalModeBtn" style="width:260px;font-size:15px;padding:20px 0;"><span class="btn-dot"></span>Original</button>
      </div>
      <button class="back-btn" id="backBtn">Back</button>
    </div>

    <div id="settingsScreen" class="screen hidden">
      <div class="grid-bg"></div><div class="scanline"></div>
      <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
      <div style="position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:32px;">
        <div style="font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:6px;color:rgba(100,160,255,0.5);text-transform:uppercase;">Settings</div>
        <div style="display:flex;flex-direction:column;gap:16px;width:280px;">
          <div style="display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(30,120,255,0.3);padding:14px 20px;background:rgba(10,40,100,0.3);">
            <span style="font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:#a0c4ff;text-transform:uppercase;">Sound FX</span>
            <button id="sfxToggle" style="font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;padding:6px 16px;cursor:pointer;border:1px solid rgba(30,120,255,0.6);background:rgba(30,120,255,0.15);color:#1e78ff;text-transform:uppercase;">ON</button>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(30,120,255,0.3);padding:14px 20px;background:rgba(10,40,100,0.3);">
            <span style="font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:#a0c4ff;text-transform:uppercase;">Music</span>
            <button id="musicToggle" style="font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;padding:6px 16px;cursor:pointer;border:1px solid rgba(30,120,255,0.6);background:rgba(30,120,255,0.15);color:#1e78ff;text-transform:uppercase;">ON</button>
          </div>
        </div>
      </div>
      <button class="back-btn" id="settingsBackBtn">Back</button>
    </div>

    <div id="gameScreen" class="screen hidden">
      <canvas id="gameCanvas"></canvas>
      <button class="back-btn" id="gameBackBtn">Menu</button>
      <div class="mode-label" id="modeLabel">Chromatic Mode</div>
      <div class="bounce-count" id="bounceCount">Bounces: 0</div>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
